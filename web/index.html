<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>deadlink — dead link checker</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <header>
      <h1>deadlink</h1>
      <p class="tagline">fast, low-false-positive dead link checking</p>
    </header>

    <form id="scan-form" autocomplete="off">
      <div class="url-row">
        <input type="url" id="url" placeholder="https://example.com" required>
        <button type="submit" id="scan-btn">Scan</button>
      </div>
      <details class="options">
        <summary>Options</summary>
        <div class="options-grid">
          <label>Max depth <input type="number" id="opt-depth" value="3" min="0" max="10"></label>
          <label>Max pages <input type="number" id="opt-pages" value="500" min="1" max="10000"></label>
          <label><input type="checkbox" id="opt-external" checked> Check external links</label>
          <label><input type="checkbox" id="opt-soft404" checked> Detect soft 404s</label>
          <label><input type="checkbox" id="opt-fragments" checked> Validate #anchors</label>
        </div>
      </details>
    </form>

    <section id="progress" hidden>
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <div id="progress-text" class="progress-text"></div>
    </section>

    <section id="summary" hidden></section>

    <section id="results" hidden>
      <div class="filter-row" id="filters"></div>
      <div id="result-list"></div>
    </section>

    <section id="recent">
      <h2>Recent scans</h2>
      <div id="recent-list" class="recent-list"></div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
